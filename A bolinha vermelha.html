<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Red Ball Journey</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #222;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        #gameCanvas {
            background-color: #87CEEB;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            max-width: 100%;
            max-height: 100vh;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            justify-content: space-between;
            width: 760px; /* Canvas width - padding */
            pointer-events: none;
        }
        .ui-text {
            font-size: 24px;
            font-weight: bold;
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        #messageBox {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.8);
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            color: white;
            display: none;
        }
        #messageBox h1 {
            margin-top: 0;
            color: #FF4444;
        }
        #messageBox p {
            font-size: 18px;
        }
        #messageBox button {
            background: #FF4444;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 18px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 15px;
            transition: background 0.3s;
        }
        #messageBox button:hover {
            background: #ff6666;
        }
    </style>
</head>
<body>

    <div id="ui">
        <div class="ui-text" id="levelText">Fase: 1</div>
        <div class="ui-text" id="controlsText">WASD ou Setas para Mover</div>
    </div>

    <canvas id="gameCanvas" width="800" height="600"></canvas>

    <div id="messageBox">
        <h1 id="msgTitle">Red Ball Journey</h1>
        <p id="msgDesc">Comece sua aventura!</p>
        <button id="msgBtn" onclick="startGame()">Jogar</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const levelText = document.getElementById('levelText');
        const messageBox = document.getElementById('messageBox');
        const msgTitle = document.getElementById('msgTitle');
        const msgDesc = document.getElementById('msgDesc');
        const msgBtn = document.getElementById('msgBtn');

        // Game States: START, PLAYING, GAMEOVER, WIN
        let gameState = 'START';
        let currentLevelIndex = 0;
        
        const keys = {
            ArrowUp: false, ArrowLeft: false, ArrowRight: false,
            w: false, a: false, d: false, ' ': false
        };

        const player = {
            x: 0, y: 0,
            w: 30, h: 30, // Hitbox
            vx: 0, vy: 0,
            speed: 5,
            jumpForce: -13,
            gravity: 0.6,
            grounded: false
        };

        let camera = { x: 0, y: 0 };
        let currentLevelData = null;

        // --- Níveis ---
        const levels = [
            {
                name: "Fase 01 - Troncos",
                startPos: { x: 100, y: 400 },
                endX: 2000,
                platforms: [
                    { x: 0, y: 550, w: 2200, h: 50 }, // Chão principal
                    { x: 500, y: 470, w: 120, h: 20 }, // Tronco
                    { x: 800, y: 400, w: 120, h: 20 },
                    { x: 1100, y: 350, w: 120, h: 20 },
                    { x: 1500, y: 470, w: 80, h: 80 },  // Parede-tronco
                ],
                spikes: [],
                hasApple: false
            },
            {
                name: "Fase 02 - Espinhos",
                startPos: { x: 100, y: 400 },
                endX: 2500,
                platforms: [
                    { x: 0, y: 550, w: 800, h: 50 },
                    { x: 1000, y: 550, w: 1800, h: 50 },
                    { x: 600, y: 450, w: 100, h: 20 },
                    { x: 850, y: 350, w: 100, h: 20 },
                    { x: 1400, y: 470, w: 150, h: 20 },
                ],
                spikes: [
                    { x: 1200, y: 520, w: 60, h: 30, count: 2 },
                    { x: 1700, y: 520, w: 90, h: 30, count: 3 }
                ],
                hasApple: false
            },
            {
                name: "Fase 03 - Desafio Final",
                startPos: { x: 100, y: 400 },
                endX: 3000,
                platforms: [
                    { x: 0, y: 550, w: 600, h: 50 },
                    { x: 750, y: 450, w: 100, h: 20 },
                    { x: 1000, y: 350, w: 100, h: 20 },
                    { x: 1250, y: 250, w: 100, h: 20 },
                    { x: 1600, y: 550, w: 800, h: 50 },
                    { x: 2500, y: 450, w: 100, h: 20 },
                    { x: 2750, y: 550, w: 500, h: 50 },
                ],
                spikes: [
                    { x: 400, y: 520, w: 90, h: 30, count: 3 },
                    { x: 1800, y: 520, w: 120, h: 30, count: 4 },
                    { x: 2100, y: 520, w: 60, h: 30, count: 2 }
                ],
                hasApple: true,
                applePos: { x: 2900, y: 535, radius: 15 } // Y alterado para tocar no chão
            }
        ];

        // --- Controles ---
        window.addEventListener('keydown', (e) => {
            if (keys.hasOwnProperty(e.key) || keys.hasOwnProperty(e.key.toLowerCase())) {
                keys[e.key] = true;
                keys[e.key.toLowerCase()] = true;
            }
        });

        window.addEventListener('keyup', (e) => {
            if (keys.hasOwnProperty(e.key) || keys.hasOwnProperty(e.key.toLowerCase())) {
                keys[e.key] = false;
                keys[e.key.toLowerCase()] = false;
            }
        });

        function showMessage(title, desc, btnText) {
            msgTitle.innerText = title;
            msgDesc.innerText = desc;
            msgBtn.innerText = btnText;
            messageBox.style.display = 'block';
        }

        function hideMessage() {
            messageBox.style.display = 'none';
        }

        function startGame() {
            gameState = 'PLAYING';
            hideMessage();
            loadLevel(currentLevelIndex);
            gameLoop();
        }

        function loadLevel(index) {
            currentLevelData = levels[index];
            player.x = currentLevelData.startPos.x;
            player.y = currentLevelData.startPos.y;
            player.vx = 0;
            player.vy = 0;
            levelText.innerText = `Fase: ${index + 1}`;
        }

        function showGameOver() {
            gameState = 'GAMEOVER';
            showMessage("Game Over", "Você tocou nos espinhos ou caiu num buraco!", "Tentar Novamente");
        }

        function showWin() {
            gameState = 'WIN';
            showMessage("Você Ganhou!", "Parabéns, você coletou a maçã e venceu o jogo!", "Jogar Novamente");
            currentLevelIndex = 0;
        }

        function nextLevel() {
            currentLevelIndex++;
            if (currentLevelIndex >= levels.length) {
                showWin();
            } else {
                loadLevel(currentLevelIndex);
            }
        }

        function checkCollision(rect1, rect2) {
            return rect1.x < rect2.x + rect2.w &&
                   rect1.x + rect1.w > rect2.x &&
                   rect1.y < rect2.y + rect2.h &&
                   rect1.y + rect1.h > rect2.y;
        }

        function checkSpikeCollision() {
            const hurtbox = { x: player.x + 5, y: player.y + 5, w: player.w - 10, h: player.h - 5 };
            for (let s of currentLevelData.spikes) {
                let spikeWidth = 30;
                let count = s.count || Math.floor(s.w / spikeWidth);
                if (checkCollision(hurtbox, { x: s.x, y: s.y + 10, w: count * spikeWidth, h: s.h - 10 })) {
                    return true;
                }
            }
            return false;
        }

        function update() {
            if (gameState !== 'PLAYING') return;

            // Input
            if (keys.ArrowLeft || keys.a) player.vx = -player.speed;
            else if (keys.ArrowRight || keys.d) player.vx = player.speed;
            else player.vx = 0;

            if ((keys.ArrowUp || keys.w || keys[' ']) && player.grounded) {
                player.vy = player.jumpForce;
                player.grounded = false;
            }

            // Gravidade
            player.vy += player.gravity;

            // Movimento X e Colisão
            player.x += player.vx;
            for (let p of currentLevelData.platforms) {
                if (checkCollision({x: player.x, y: player.y, w: player.w, h: player.h}, p)) {
                    if (player.vx > 0) {
                        player.x = p.x - player.w;
                    } else if (player.vx < 0) {
                        player.x = p.x + p.w;
                    }
                    player.vx = 0;
                }
            }

            // Movimento Y e Colisão
            player.y += player.vy;
            player.grounded = false;
            for (let p of currentLevelData.platforms) {
                if (checkCollision({x: player.x, y: player.y, w: player.w, h: player.h}, p)) {
                    if (player.vy > 0) {
                        player.y = p.y - player.h;
                        player.grounded = true;
                    } else if (player.vy < 0) {
                        player.y = p.y + p.h;
                    }
                    player.vy = 0;
                }
            }

            // Morte por queda
            if (player.y > 1000) {
                showGameOver();
            }

            // Colisão com Espinhos
            if (checkSpikeCollision()) {
                showGameOver();
            }

            // Progresso de Fase (se não houver maçã)
            if (!currentLevelData.hasApple && player.x > currentLevelData.endX) {
                nextLevel();
            }

            // Colisão com Maçã
            if (currentLevelData.hasApple) {
                let dx = (player.x + player.w/2) - currentLevelData.applePos.x;
                let dy = (player.y + player.h/2) - currentLevelData.applePos.y;
                let distance = Math.sqrt(dx*dx + dy*dy);
                if (distance < (player.w/2 + currentLevelData.applePos.radius)) {
                    showWin();
                }
            }

            // Atualiza Câmera
            camera.x = player.x - canvas.width / 2 + player.w / 2;
            if (camera.x < 0) camera.x = 0;
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (gameState !== 'PLAYING') return;

            ctx.save();
            ctx.translate(-camera.x, -camera.y);

            // Troncos
            ctx.fillStyle = '#654321';
            for (let p of currentLevelData.platforms) {
                ctx.fillRect(p.x, p.y, p.w, p.h);
                ctx.fillStyle = '#8B5A2B';
                ctx.fillRect(p.x, p.y, p.w, 4);
                ctx.fillStyle = '#654321';
            }

            // Espinhos
            ctx.fillStyle = '#808080';
            for (let s of currentLevelData.spikes) {
                let spikeWidth = 30;
                let count = s.count || Math.floor(s.w / spikeWidth);
                for(let i = 0; i < count; i++) {
                    let spX = s.x + (i * spikeWidth);
                    ctx.beginPath();
                    ctx.moveTo(spX, s.y + s.h);
                    ctx.lineTo(spX + spikeWidth / 2, s.y);
                    ctx.lineTo(spX + spikeWidth, s.y + s.h);
                    ctx.fill();
                    ctx.closePath();
                }
            }

            // Maçã
            if (currentLevelData.hasApple) {
                let ax = currentLevelData.applePos.x;
                let ay = currentLevelData.applePos.y;
                let ar = currentLevelData.applePos.radius;
                
                ctx.fillStyle = '#e23d28';
                ctx.beginPath();
                ctx.arc(ax, ay, ar, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = '#4CAF50';
                ctx.beginPath();
                ctx.moveTo(ax, ay - ar + 2);
                ctx.quadraticCurveTo(ax + 5, ay - ar - 10, ax + 10, ay - ar - 5);
                ctx.lineTo(ax + 5, ay - ar);
                ctx.fill();
            }

            // Player
            ctx.fillStyle = '#FF0000';
            ctx.beginPath();
            ctx.arc(player.x + player.w/2, player.y + player.h/2, player.w/2, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
            ctx.beginPath();
            ctx.arc(player.x + player.w/2 - 5, player.y + player.h/2 - 5, player.w/4, 0, Math.PI * 2);
            ctx.fill();

            // Ponto de Chegada
            if (!currentLevelData.hasApple) {
                ctx.fillStyle = 'rgba(255, 215, 0, 0.5)';
                ctx.fillRect(currentLevelData.endX, currentLevelData.startPos.y - 100, 50, 600);
            }

            ctx.restore();
        }

        function gameLoop() {
            if(gameState === 'PLAYING') {
                update();
                draw();
                requestAnimationFrame(gameLoop);
            }
        }

        showMessage("Red Ball Journey", "Use WASD ou Setas para mover e pular.\nEvite os espinhos e buracos!", "Jogar");

    </script>
</body>
</html>
